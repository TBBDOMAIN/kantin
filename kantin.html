<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barcode Scanner - Treasure Bay</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode/minified/html5-qrcode.min.js"></script>

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-image: url('img/Wonderful Treasurebay1080.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      min-height: 100vh;
      color: #fff;
      padding: 20px 0;
      margin: 0;
    }

    /* --- RUNNING TEXT CSS --- */
    .marquee-wrapper {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      border-bottom: 2px solid rgba(255, 255, 255, 0.1);
      padding: 10px 0;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      overflow: hidden;
    }

    .marquee-text {
      display: inline-block;
      white-space: nowrap;
      padding-left: 100%;
      animation: marquee 25s linear infinite;
      font-weight: 600;
      color: #00f2fe;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    @keyframes marquee {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-100%, 0); }
    }

    .container { margin-top: 60px; }

    .glass-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 30px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
      margin-bottom: 20px;
    }

    .counter-box {
      background: rgba(220, 53, 69, 0.9);
      border-radius: 15px;
      padding: 15px;
      display: inline-block;
      min-width: 200px;
      margin-bottom: 20px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 0 20px rgba(220, 53, 69, 0.5);
    }

    #total-scan {
      color: #fff;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    .input-wrapper {
      position: relative;
      max-width: 500px;
      margin: 0 auto 20px;
    }

    #barcode-input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .btn {
      border-radius: 12px;
      padding: 12px 25px;
      font-weight: 600;
      transition: all 0.3s ease;
      margin: 5px;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .table {
      color: #fff !important;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 15px;
    }

    #qr-reader {
      border-radius: 15px;
      overflow: hidden;
      border: 3px solid #0f0f0f !important;
      max-width: 500px;
      margin: 20px auto;
    }

    .status-indicator {
      font-size: 0.9rem;
      color: #00ff00;
      margin-bottom: 5px;
      font-weight: 600;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }

    .hidden-column { display: none; }
  </style>
</head>
<body>

  <div class="marquee-wrapper">
    <div class="marquee-text" id="running-text-display">
      Selamat Datang di Digital Meal Treasure Bay Bintan - Silahkan Scan Barcode Anda
    </div>
  </div>

  <div class="container">
    <div class="text-center mb-4">
      <h1 class="display-5 fw-bold"><i class="bi bi-ticket-perforated"></i> Digital Meal </h1>
      <h2 class="h5 opacity-75">TREASURE BAY BINTAN</h2>
    </div>

    <div class="glass-card text-center">
      <div class="status-indicator animate__animated animate__pulse animate__infinite">
        <i class="bi bi-record-circle-fill"></i> Scanner Standby
      </div>

      <div class="input-wrapper">
        <input 
          type="text" 
          id="barcode-input" 
          placeholder="Arahkan Scanner..." 
          autofocus 
          autocomplete="off"
        />
      </div>

      <div class="d-flex flex-wrap justify-content-center">
        <button id="qr-scan-btn" class="btn btn-primary">
          <i class="bi bi-camera-fill me-2"></i> Scan Kamera
        </button>
        <button id="stop-qr-btn" class="btn btn-danger" style="display: none;">
          <i class="bi bi-stop-circle-fill me-2"></i> Tutup Kamera
        </button>
        <button id="clear-btn" class="btn btn-warning text-dark">
          <i class="bi bi-trash me-2"></i> Clear History
        </button>
      </div>

      <div class="counter-box mt-3">
        <div class="small opacity-75">Total Meal Today</div>
        <div class="display-5 fw-bold" id="total-scan">0</div>
      </div>
      <div id="qr-reader" style="display: none;"></div>
    </div>

    <div class="glass-card">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="h5 mb-0"><i class="bi bi-clock-history me-2"></i>Riwayat Kantin</h3>
      </div>
      <div class="table-responsive">
        <table id="data-table" class="table table-hover align-middle">
          <thead class="table-dark">
            <tr>
              <th>No</th>
              <th class="barcode-col hidden-column">Data Barcode</th>
              <th>Nama</th>
              <th>Status</th>
              <th>Waktu Scan</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <iframe name="hidden_form_frame" style="display:none;"></iframe>

  <script>
    // --- 1. FUNGSI SYNC RUNNING TEXT (PENTING) ---
    function loadAnnouncement() {
        const display = document.getElementById('running-text-display');
        const settings = JSON.parse(localStorage.getItem("runningTextSettings"));
        const DB_URL = "https://kantin-tbb-default-rtdb.asia-southeast1.firebasedatabase.app/:.json";
        if (settings) {
            // Menggunakan textContent agar emoticon terproses dengan benar
            display.textContent = settings.text; 
            display.style.color = settings.color;
            display.style.fontFamily = settings.font;
        }
    }

    // Jalankan saat pertama kali buka halaman
    loadAnnouncement();

    // Pantau perubahan dari halaman admin secara real-time
    window.addEventListener('storage', (e) => {
        if (e.key === 'runningTextSettings') {
            loadAnnouncement();
        }
    });

    // --- 2. LOGIKA UTAMA SCANNER ---
    document.addEventListener("DOMContentLoaded", () => {
      const inputField = document.getElementById("barcode-input");
      const tableBody = document.getElementById("table-body");
      const totalScanDisplay = document.getElementById("total-scan");
      const qrScanButton = document.getElementById("qr-scan-btn");
      const stopQrButton = document.getElementById("stop-qr-btn");
      const qrReaderElement = document.getElementById("qr-reader");
      
      let html5QrCode;
      let scannedList = JSON.parse(localStorage.getItem("scannedList")) || [];
      let isBarcodeVisible = false;

      // Fokus otomatis tetap terjaga
      document.addEventListener("click", () => {
        if (qrReaderElement.style.display === "none") {
          inputField.focus();
        }
      });

      function renderTable() {
        tableBody.innerHTML = "";
        totalScanDisplay.innerText = scannedList.length;

        const reversedList = [...scannedList].reverse();
        reversedList.forEach((item, index) => {
          const originalIndex = scannedList.length - index;
          const row = document.createElement("tr");
          row.innerHTML = `
            <td class="fw-bold">${originalIndex}</td>
            <td class="barcode-col ${isBarcodeVisible ? '' : 'hidden-column'} text-truncate" style="max-width:200px">${item.code}</td>
            <td><span class="badge bg-light text-dark px-3 py-2">${item.name}</span></td>
            <td><span class="badge bg-success"><i class="bi bi-check-circle-fill me-1"></i> Done</span></td>
            <td class="small text-white">${item.time}</td>
          `;
          tableBody.appendChild(row);
        });
      }

      function getParameterByName(name, url) {
        try {
            const urlObj = new URL(url);
            return urlObj.searchParams.get(name) || "Tamu";
        } catch (e) { return "Tamu"; }
      }

      function processBarcode(code) {
        const barcode = code.trim();
        if (!barcode) return;

        const isDuplicate = scannedList.some(item => item.code === barcode);
        if (isDuplicate) {
          Swal.fire({
            icon: 'error',
            title: 'OOPS !!',
            text: 'Kamu Sudah Scan Sebelumnya.',
            timer: 2000,
            showConfirmButton: false
          });
          inputField.value = "";
          return;
        }

        const name = getParameterByName("entry.865322956", barcode);
        const time = new Date().toLocaleString("id-ID", { 
            hour: '2-digit', minute: '2-digit', second: '2-digit',
            day: '2-digit', month: 'short'
        });

        const newData = { code: barcode, name: name, time: time, status: "Done" };
        scannedList.push(newData);
        localStorage.setItem("scannedList", JSON.stringify(scannedList));

        window.open(barcode, "hidden_form_frame");
        renderTable();

        Swal.fire({
          icon: 'success',
          title: 'BERHASIL',
          html: `ENJOY YOUR MEAL, <b>${name}</b>!`,
          timer: 1500,
          showConfirmButton: false
        });

        inputField.value = "";
        inputField.focus();
      }

      inputField.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          processBarcode(inputField.value);
        }
      });

      qrScanButton.addEventListener("click", () => {
        qrReaderElement.style.display = "block";
        qrScanButton.style.display = "none";
        stopQrButton.style.display = "inline-block";

        html5QrCode = new Html5Qrcode("qr-reader");
        html5QrCode.start(
          { facingMode: "environment" },
          { fps: 15, qrbox: { width: 250, height: 250 } },
          (text) => { processBarcode(text); }
        ).catch(err => {
          Swal.fire('Error', 'Gagal mengakses kamera', 'error');
        });
      });

      stopQrButton.addEventListener("click", () => {
        if (html5QrCode) {
          html5QrCode.stop().then(() => {
            qrReaderElement.style.display = "none";
            qrScanButton.style.display = "inline-block";
            stopQrButton.style.display = "none";
          });
        }
      });

      document.getElementById("clear-btn").addEventListener("click", () => {
        Swal.fire({
          title: 'Hapus Semua Data?',
          text: "Total scan akan kembali ke 0!",
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#d33',
          confirmButtonText: 'Ya, Hapus!'
        }).then((result) => {
          if (result.isConfirmed) {
            scannedList = [];
            localStorage.removeItem("scannedList");
            renderTable();
            Swal.fire('Terhapus!', 'Data sudah bersih.', 'success');
          }
        });
      });

      renderTable();
    });
  </script>
</body>
</html>
