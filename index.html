<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barcode Scanner</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode/minified/html5-qrcode.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container mt-5">
    <h1 class="text-center">Digital Kupon Treasure Bay Bintan</h1>
    <div class="scanner-container">
      <div class="scanner-line"></div>
      <input
        type="text"
        id="barcode-input"
        class="form-control"
        placeholder="Scan atau masukkan barcode di sini..."
        autofocus
      />
    </div>

    <div id="spinner" class="text-center d-none mt-3">
      <div class="spinner-border text-success" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <div class="mt-4">
      <button id="export-btn" class="btn btn-success">
        <i class="bi bi bi-download"></i> Download Excel
      </button>
      <button id="qr-scan-btn" class="btn btn-primary">
        <i class="bi bi-qr-code-scan"></i> Scan QR Code
      </button>
      <button id="stop-qr-btn" class="btn btn-danger" style="display: none;">
        <i class="bi bi-stop-circle-fill"></i> Stop QR Scan
      </button>
    </div>

    <div id="qr-reader" style="width: 100%; margin-top: 20px; display: none;"></div>

    <table id="data-table" class="table table-bordered mt-4">
      <thead>
        <tr>
          <th>No</th>
          <th>Barcode/Link</th>
          <th>Nama</th>
          <th>Status</th>
          <th>Waktu</th>
        </tr>
      </thead>
      <tbody id="table-body">
        </tbody>
    </table>
  </div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const inputField = document.getElementById("barcode-input");
      const tableBody = document.getElementById("table-body");
      const exportButton = document.getElementById("export-btn");
      const qrScanButton = document.getElementById("qr-scan-btn");
      const qrReaderElement = document.getElementById("qr-reader");
      const spinner = document.getElementById("spinner");
      // Tambahkan referensi untuk tombol stop QR
      const stopQrButton = document.getElementById("stop-qr-btn"); 
      let html5QrCode; // Deklarasikan html5QrCode di lingkup yang lebih luas

      let rowCount = 0; // Untuk menghitung baris

      function getParameterByName(name, url) {
        name = name.replace(/[\[\]]/g, "\\$&");
        const regex = new RegExp("[?&]" + name + "(=([^&#]*)|&|#|$)");
        const results = regex.exec(url);
        if (!results) return null;
        if (!results[2]) return '';
        return decodeURIComponent(results[2].replace(/\+/g, " "));
      }

      function getCurrentDateTime() {
        const now = new Date();
        const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
        const dayName = days[now.getDay()];
        const date = now.toLocaleDateString("id-ID");
        const time = now.toLocaleTimeString("id-ID");
        return `${dayName}, ${date} ${time}`;
      }

      inputField.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          spinner.classList.remove("d-none");

          const barcode = inputField.value.trim();
          if (barcode) {
            setTimeout(() => {
              spinner.classList.add("d-none");
              const name = getParameterByName("entry.865322956", barcode) || "Unknown";
              const status = getParameterByName("entry.1775102801", barcode) || "Pending";
              window.open(barcode, "_blank");
              
              const row = document.createElement("tr");
              row.innerHTML = `
                <td>${++rowCount}</td> <td>${barcode}</td>
                <td>${name}</td>
                <td>${status}</td>
                <td>${getCurrentDateTime()}</td>
              `;
              // Ubah dari appendChild menjadi insertBefore untuk menempatkan di paling atas
              tableBody.insertBefore(row, tableBody.firstChild);

              // Perbarui nomor baris yang ada jika perlu (opsional, tergantung preferensi)
              // Jika Anda ingin nomor urut selalu berurutan dari 1, ini perlu di-reindex setiap kali.
              // Namun, untuk kesederhanaan, `rowCount` hanya akan bertambah.
              // Jika ingin nomor urut selalu 1, 2, 3 dari atas, maka perlu loop ulang setiap kali.

              inputField.value = "";
            }, 1000);
          }
        }
      });

      exportButton.addEventListener("click", () => {
        const table = document.getElementById("data-table");
        // Sebelum ekspor, Anda mungkin ingin memperbarui nomor urut jika itu penting untuk ekspor
        // (misalnya, jika Anda ingin 1, 2, 3 dari yang terbaru).
        // Untuk saat ini, kita akan mengekspor apa adanya di tabel.
        const workbook = XLSX.utils.table_to_book(table);
        XLSX.writeFile(workbook, "DataBarcode.xlsx");
      });

      // Fungsi untuk memulai QR Scanner
      qrScanButton.addEventListener("click", () => {
        console.log("QR Scan Button Clicked.");
        qrReaderElement.style.display = "block";
        stopQrButton.style.display = "inline-block";

        // Inisialisasi QR Scanner jika belum ada atau sudah berhenti
        if (!html5QrCode || !html5QrCode.isScanning) {
            html5QrCode = new Html5Qrcode("qr-reader");
            html5QrCode.start(
                { facingMode: "environment" }, // Gunakan kamera belakang
                { fps: 10, qrbox: 250 }, // Pengaturan scanner
                (decodedText) => {
                    console.log("QR Code Scanned:", decodedText);
                    inputField.value = decodedText; // Masukkan hasil QR Code ke kolom input
                    alert(`Hasil QR Code: ${decodedText}`);
                    
                    // Trigger the keydown event to process the scanned barcode
                    const enterEvent = new KeyboardEvent('keydown', {
                        key: 'Enter',
                        code: 'Enter',
                        keyCode: 13,
                        which: 13,
                        bubbles: true
                    });
                    inputField.dispatchEvent(enterEvent);

                    // Stop scanner after processing
                    html5QrCode.stop().then(() => {
                        console.log("QR Scanner Stopped after scan.");
                        qrReaderElement.style.display = "none";
                        stopQrButton.style.display = "none";
                    }).catch((err) => {
                        console.error("Error stopping QR Code scanner after scan:", err);
                    });
                },
                (errorMessage) => {
                    console.error("QR Code Scan Error:", errorMessage);
                }
            ).catch((err) => {
                console.error("Camera Initialization Error:", err);
            });
        }
      });

      // Fungsi untuk menghentikan QR Scanner
      stopQrButton.addEventListener("click", () => {
        if (html5QrCode) {
          html5QrCode.stop().then(() => {
            console.log("QR Scanner Stopped.");
            qrReaderElement.style.display = "none";
            stopQrButton.style.display = "none";
          }).catch((err) => {
            console.error("Error stopping QR Code scanner:", err);
          });
        }
      });
    });
  </script>
  <script src="ScriptQR.js"></script> </body>
</html>
